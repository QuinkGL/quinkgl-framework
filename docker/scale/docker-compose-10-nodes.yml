services:
  node_1:
    image: quinkgl-node
    command: python3 scripts/run_gossip_node.py --node-id node_1 --domain cifar10-vision
      --dataset cifar10 --split-type iid --total-nodes 10 --node-index 0 --topology
      cyclon --gossip-interval 5.0 --epochs 3 --max-rounds 20 --lr 0.001 --batch-size 32
    environment:
      PYTHONUNBUFFERED: '1'
      TUNNEL_SERVER: ${TUNNEL_SERVER:-localhost:50051}
    ports:
    - 8001:8001
    volumes:
    - ./data:/app/data
    - ./logs:/app/logs
