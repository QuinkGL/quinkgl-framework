version: '3.8'
services:
  node_1:
    image: quinkgl-node
    command: python3 scripts/run_gossip_node.py --node-id node_1 --domain scale-test
      --dataset cifar10 --split-type iid --total-nodes 20 --node-index 0 --topology
      cyclon --gossip-interval 5.0 --epochs 1
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      PYTHONUNBUFFERED: '1'
    ports:
    - 8001:8001
    volumes:
    - ./data:/app/data
  node_2:
