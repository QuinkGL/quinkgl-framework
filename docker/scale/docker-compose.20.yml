services:
  node_1:
    build:
      context: ../../
      dockerfile: docker/Dockerfile
    command: python3 scripts/run_gossip_node.py --node-id node_1 --domain scale-test
      --dataset breast_cancer --split-type iid --total-nodes 20 --node-index 0 --topology
      cyclon --gossip-interval 2.0 --epochs 1
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      PYTHONUNBUFFERED: '1'
      TUNNEL_SERVER: ${TUNNEL_SERVER:-localhost:50051}
    ports:
    - 8001:8001
