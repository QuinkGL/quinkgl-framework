# ==============================================================================
# IMPORTANT: TUNNEL_SERVER must be set before running docker-compose
# ==============================================================================
#
# The TUNNEL_SERVER environment variable is REQUIRED. Without it, the
# containers will fail to start with a clear error message.
#
# Setup options:
#
#   Option 1: Create .env in project root with:
#     TUNNEL_SERVER=your-server:port
#
#   Option 2: Export before running:
#     export TUNNEL_SERVER=your-server:port
#     docker-compose up
#
#   Option 3: Pass directly:
#     TUNNEL_SERVER=your-server:port docker-compose up
#
# Format: host:port (e.g., localhost:50051 or your-server.com:50051)
# ==============================================================================

services:

  # Peer 1
  peer1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quinkgl-peer1
    environment:
      - NODE_ID=peer1
      - TUNNEL_SERVER=${TUNNEL_SERVER:?TUNNEL_SERVER environment variable is required but not set. Set it in .env file or export TUNNEL_SERVER=host:port}
    command: python3 chat.py --node-id peer1 --tunnel ${TUNNEL_SERVER:?TUNNEL_SERVER not set}
    stdin_open: true
    tty: true
    networks:
      - quinkgl-network

