name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Install, Import, Smoke Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      # pyipv8 → libnacl expects a system libsodium (not bundled in wheels on all platforms).
      - name: Install libsodium (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsodium
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib" >> "$GITHUB_ENV"

      - name: Install libsodium (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://github.com/jedisct1/libsodium/releases/download/1.0.22-RELEASE/libsodium-1.0.22-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\libsodium.zip"
          Expand-Archive "$env:TEMP\libsodium.zip" -DestinationPath "$env:TEMP\libsodium" -Force
          $dll = Get-ChildItem "$env:TEMP\libsodium" -Recurse -Filter "libsodium.dll" |
            Where-Object { $_.FullName -match '[\\/]x64[\\/]Release[\\/]' } |
            Select-Object -First 1
          if (-not $dll) { throw "libsodium.dll (x64 Release) not found in archive" }
          Copy-Item $dll.FullName -Destination "$env:SystemRoot\System32\libsodium.dll" -Force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pip install build

      - name: Import smoke
        run: python -c "import quinkgl; print(quinkgl.__version__)"

      - name: Run smoke tests
        run: pytest tests/test_package_metadata.py tests/aggregation/test_public_imports.py --tb=short -q

      - name: Run test gate (stable subset)
        # Tam koleksiyon kod/test hizalaması yenilenene kadar PR ve matriste bu alt-küme kullanılır.
        # Tek satır: Windows runners varsayılan pwsh ile \ satır devamı yok; parçalanınca pytest
        # bazen sürücü kökünden toplamaya kalkışıp PermissionError üretebiliyor.
        run: pytest --tb=short -q tests/test_package_metadata.py tests/cli tests/docs tests/manifest tests/telemetry tests/api

      - name: Build distribution
        run: python -m build
