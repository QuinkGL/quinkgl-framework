name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Install, Import, Smoke Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pip install build

      - name: Import smoke
        run: python -c "import quinkgl; print(quinkgl.__version__)"

      - name: Run smoke tests
        run: pytest tests/test_package_metadata.py tests/aggregation/test_public_imports.py --tb=short -q

      - name: Run full test suite
        run: pytest --tb=short -q

      - name: Build distribution
        run: python -m build
